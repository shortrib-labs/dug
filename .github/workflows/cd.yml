name: CD

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Release Build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - run: make build
      - name: Ad-hoc sign with hardened runtime
        run: codesign --force --options runtime --sign - .build/release/dug
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dug
          path: .build/release/dug
