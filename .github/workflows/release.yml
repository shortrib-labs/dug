name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  validate:
    name: Validate Tag
    runs-on: macos-15
    outputs:
      prerelease: ${{ steps.version.outputs.prerelease }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Verify tag matches version
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION=$(grep 'let dugVersion' Sources/dug/Dug.swift | sed 's/.*"\(.*\)".*/\1/')
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag v$TAG does not match dugVersion \"$VERSION\""
            exit 1
          fi

          # Semver pre-release: anything with a hyphen after the patch version
          if echo "$TAG" | grep -q '^[0-9]*\.[0-9]*\.[0-9]*-'; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

  test:
    name: Test
    runs-on: macos-15
    needs: validate
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - run: brew install swiftlint
      - run: make lint
      - run: make unit
      - run: make integration

  build:
    name: Build
    runs-on: macos-15
    needs: test
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - run: make build
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dug-unsigned
          path: .build/release/dug

  sign:
    name: Sign & Notarize
    runs-on: macos-15
    needs: build
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dug-unsigned

      - name: Install Developer ID certificate
        env:
          P12_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12 }}
          P12_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          # Decode certificate
          printf '%s' "$P12_BASE64" | base64 --decode > "$RUNNER_TEMP/certificate.p12"

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          security import "$RUNNER_TEMP/certificate.p12" \
            -P "$P12_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # Allow codesign to access the keychain
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add to search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Sign with Developer ID
        run: >
          codesign --force --options runtime
          --sign "Developer ID Application"
          --timestamp
          dug

      - name: Store notarization credentials
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          xcrun notarytool store-credentials "notary-profile" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --keychain "$KEYCHAIN_PATH"

      - name: Notarize
        run: |
          ditto -c -k dug dug.zip
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          xcrun notarytool submit dug.zip \
            --keychain-profile "notary-profile" \
            --keychain "$KEYCHAIN_PATH" \
            --wait

      - name: Clean up keychain
        if: always()
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          rm -f "$RUNNER_TEMP/certificate.p12"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dug-signed
          path: dug

  release:
    name: Release
    runs-on: macos-15
    needs: [validate, sign]
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dug-signed
          path: .build/release

      - name: Create source tarball
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          git archive --format=tar.gz --prefix=dug-${TAG}/ -o dug-${TAG}.tar.gz HEAD

      - name: Compute SHA256
        id: sha
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          SHA=$(shasum -a 256 dug-${TAG}.tar.gz | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Attest binary provenance
        uses: actions/attest-build-provenance@db473fddc028af60658334401dc6fa3ffd8669fd # v2.3.0
        with:
          subject-path: .build/release/dug

      - name: Attest tarball provenance
        uses: actions/attest-build-provenance@db473fddc028af60658334401dc6fa3ffd8669fd # v2.3.0
        with:
          subject-path: dug-${{ steps.sha.outputs.tag }}.tar.gz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          generate_release_notes: true
          prerelease: ${{ needs.validate.outputs.prerelease == 'true' }}
          body: |
            ## Install

            ```sh
            brew install shortrib-labs/tap/dug
            ```

            Or download the binary directly — it's signed and notarized.

            ## Verify provenance

            ```sh
            gh attestation verify ./dug -R shortrib-labs/dug
            ```

            ## SHA256

            ```
            ${{ steps.sha.outputs.sha256 }}  dug-${{ steps.sha.outputs.tag }}.tar.gz
            ```
          files: |
            .build/release/dug
            dug-${{ steps.sha.outputs.tag }}.tar.gz

  update-tap:
    name: Update Homebrew Tap
    runs-on: macos-15
    needs: [validate, release]
    if: needs.validate.outputs.prerelease == 'false'
    steps:
      - name: Compute archive SHA256
        id: archive
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          curl -sL "https://github.com/shortrib-labs/dug/archive/refs/tags/${TAG}.tar.gz" -o archive.tar.gz
          SHA=$(shasum -a 256 archive.tar.gz | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: shortrib-labs/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}

      - name: Update formula
        run: |
          VERSION="${{ steps.archive.outputs.version }}"
          SHA="${{ steps.archive.outputs.sha256 }}"
          TAG="${{ steps.archive.outputs.tag }}"
          sed -i '' "s|url \".*\"|url \"https://github.com/shortrib-labs/dug/archive/refs/tags/${TAG}.tar.gz\"|" Formula/dug.rb
          sed -i '' "s|sha256 \".*\"|sha256 \"${SHA}\"|" Formula/dug.rb

      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.archive.outputs.version }}"
          TAG="${{ steps.archive.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "dug-${VERSION}"
          git add Formula/dug.rb
          git commit -m "dug ${VERSION}"
          git push -u origin "dug-${VERSION}"
          gh pr create \
            --title "dug ${VERSION}" \
            --body "Automated formula update from [dug ${VERSION}](https://github.com/shortrib-labs/dug/releases/tag/${TAG})"
