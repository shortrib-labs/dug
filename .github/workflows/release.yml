name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  release:
    name: Build and Release
    runs-on: macos-15
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Verify tag matches version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION=$(grep 'let dugVersion' Sources/dug/Dug.swift | sed 's/.*"\(.*\)".*/\1/')
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag v$TAG does not match dugVersion \"$VERSION\""
            exit 1
          fi

      - run: make lint
      - run: make unit
      - run: make build

      - name: Ad-hoc sign with hardened runtime
        run: codesign --force --options runtime --sign - .build/release/dug

      - name: Create source tarball
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          git archive --format=tar.gz --prefix=dug-${TAG}/ -o dug-${TAG}.tar.gz HEAD

      - name: Compute SHA256
        id: sha
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          SHA=$(shasum -a 256 dug-${TAG}.tar.gz | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Attest binary provenance
        uses: actions/attest-build-provenance@db473fddc028af60658334401dc6fa3ffd8669fd # v2.3.0
        with:
          subject-path: .build/release/dug

      - name: Attest tarball provenance
        uses: actions/attest-build-provenance@db473fddc028af60658334401dc6fa3ffd8669fd # v2.3.0
        with:
          subject-path: dug-${{ steps.sha.outputs.tag }}.tar.gz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          generate_release_notes: true
          body: |
            ## Install

            ```sh
            brew install shortrib-labs/tap/dug
            ```

            Or download the binary from this release.

            ## Verify provenance

            ```sh
            gh attestation verify ./dug -R shortrib-labs/dug
            ```

            ## SHA256

            ```
            ${{ steps.sha.outputs.sha256 }}  dug-${{ steps.sha.outputs.tag }}.tar.gz
            ```
          files: |
            .build/release/dug
            dug-${{ steps.sha.outputs.tag }}.tar.gz
