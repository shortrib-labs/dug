name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - run: make lint

  unit:
    name: Unit Tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - run: make unit

  integration:
    name: Integration Tests
    runs-on: macos-15
    if: github.event_name == 'push'
    needs: unit
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - run: make integration

  build:
    name: Release Build
    runs-on: macos-15
    if: github.event_name == 'push'
    needs: [lint, unit]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - run: make build
      - name: Ad-hoc sign with hardened runtime
        run: codesign --force --options runtime --sign - .build/release/dug
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dug
          path: .build/release/dug
