name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - run: make lint

  unit:
    name: Unit Tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - run: make unit

  integration:
    name: Integration Tests
    runs-on: macos-15
    if: github.event_name == 'push'
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - run: make integration

  build:
    name: Release Build
    runs-on: macos-15
    if: github.event_name == 'push'
    needs: [lint, unit]
    steps:
      - uses: actions/checkout@v4
      - run: make build
      - uses: actions/upload-artifact@v4
        with:
          name: dug
          path: .build/release/dug
