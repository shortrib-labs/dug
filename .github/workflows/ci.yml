name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - run: brew install swiftlint
      - run: make lint

  unit:
    name: Unit Tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - run: make unit

  integration:
    name: Integration Tests
    runs-on: macos-15
    needs: unit
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - run: make integration

  build:
    name: Release Build
    runs-on: macos-15
    needs: [lint, unit, integration]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - run: make build
      - name: Ad-hoc sign with hardened runtime
        run: codesign --force --options runtime --sign - .build/release/dug
