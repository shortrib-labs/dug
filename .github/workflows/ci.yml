name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - run: brew install swiftlint
      - run: make lint

  unit:
    name: Unit Tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - run: make unit

  integration:
    name: Integration Tests
    runs-on: macos-15
    needs: unit
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - run: make integration

  completions:
    name: Check Completions
    runs-on: macos-15
    needs: unit
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - run: make check-completions

  nix-sync:
    name: Check Nix Sync
    runs-on: macos-15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - run: make check-nix-sync

  build:
    name: Release Build
    runs-on: macos-15
    needs: [lint, unit, integration]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - run: make build
      - name: Ad-hoc sign with hardened runtime
        run: codesign --force --options runtime --sign - .build/release/dug
