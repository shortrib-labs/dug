name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: brew install swiftlint
      - run: make lint

  unit:
    name: Unit Tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: make unit

  integration:
    name: Integration Tests
    runs-on: macos-15
    needs: unit
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: make integration

  build:
    name: Release Build
    runs-on: macos-15
    needs: [lint, unit, integration]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: make build
      - name: Ad-hoc sign with hardened runtime
        run: codesign --force --options runtime --sign - .build/release/dug
